<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Hub</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:black;
  color:white;
  overflow-x:hidden;
  min-height:100vh;
}

/* 🌟 FIXED VIDEO BACKGROUND (CENTERED PROPERLY) */
#bgVideo{
  position:fixed;
  top:50%;
  left:50%;
  min-width:100%;
  min-height:100%;
  width:auto;
  height:auto;

  transform:translate(-50%,-50%) scale(1.15);

  object-fit:cover;

  object-position:center center;

  z-index:-3;
}

/* PARTICLES */
.particle{
  position:fixed;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:0.4;
  pointer-events:none;
  animation:float linear infinite;
  z-index:0;
}

/* SCREEN */
.screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  z-index:1;
}

.hidden{
  display:none;
}

/* TITLE */
.title{
  font-size:4.5rem;
  letter-spacing:10px;
  margin-bottom:20px;
  text-shadow:0 0 10px white, 0 0 30px white;
}

/* SUB */
.sub{
  color:#ccc;
  margin-bottom:40px;
  letter-spacing:3px;
}

/* BUTTON */
button{
  padding:22px 55px;
  font-size:1.5rem;
  font-weight:bold;
  border:none;
  border-radius:15px;
  cursor:pointer;
  background:white;
  color:black;
  transition:0.3s;
  box-shadow:0 0 20px white, 0 0 50px rgba(255,255,255,0.4);
}

button:hover{
  transform:scale(1.08);
  background:black;
  color:white;
  border:2px solid white;
  box-shadow:0 0 30px white, 0 0 80px white;
}

/* HUB GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:20px;
  width:90%;
  max-width:1200px;
  margin-top:30px;
}

/* HUB LINKS */
a{
  display:block;
  padding:20px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(5px);
  transition:0.3s;
  box-shadow:0 0 10px rgba(255,255,255,0.1);
}

a:hover{
  transform:translateY(-8px) scale(1.03);
  border:1px solid white;
  background:rgba(255,255,255,0.1);
  box-shadow:0 0 25px white, 0 0 60px rgba(255,255,255,0.4);
}

/* FLOAT ANIMATION */
@keyframes float{
  from{ transform:translateY(100vh); }
  to{ transform:translateY(-100vh); }
}

</style>

</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop id="bgVideo">
  <source src="background.mp4" type="video/mp4">
</video>

<!-- START -->
<div id="start" class="screen">

  <div class="title">Kermit HUB</div>
  <div class="sub">GAME COLLECTION</div>

  <button onclick="openHub()">CLICK HERE</button>

</div>

<!-- HUB -->
<div id="hub" class="screen hidden">

  <div class="title">Kermit HUB</div>
  <div class="sub">YOUR LINKS</div>

  <div class="grid">

    <a href="https://sites.google.com/view/nuggie16-games/home" target="_blank">Nuggie16 Games</a>

    <a href="https://docs.google.com/document/d/1pLT1W8LLl8HxM2n_yQhI3VNjFWT4Dkid0g7wLOaFCrA/edit" target="_blank">AMBERLIGHT</a>

    <a href="https://docs.google.com/document/d/1FWPW14wUWxv-yvE7t6YT6-hdmlx1TNt7qVoaLmIwR70/edit" target="_blank">Google Doc 2</a>

    <a href="https://docs.google.com/presentation/d/1OjrWHYHz5xbxhVYfWbDF4J0NdM3AYHC9x2pTchv4GuU/edit" target="_blank">Roku</a>

    <a href="https://sites.google.com/ottumwaschools.com/vybrixv3/home" target="_blank">Vybrix</a>

    <a href="https://sites.google.com/view/gxming-zone-13-/home" target="_blank">GXMING Zone</a>

    <a href="https://sites.google.com/view/dominumnetworkv2/" target="_blank">Dominum Network</a>

    <a href="https://sites.google.com/view/susanoosarcade/home" target="_blank">Susanoo Arcade</a>

    <a href="https://nevercap.ai/resources/youtube-to-mp4" target="_blank">YouTube to MP4</a>

    <a href="https://irv77.github.io/AmplerLauncher/" target="_blank">Ampler Launcher</a>

    <a href="https://sites.google.com/view/ultimate-arcade-backup-again/home" target="_blank">Ultimate Arcade</a>

    <a href="https://sites.google.com/view/botulinum-/home" target="_blank">Botulinum</a>

    <a href="https://sites.google.com/view/9-1project/home" target="_blank">9.1 Project</a>

    <a href="https://sites.google.com/view/eternity-space" target="_blank">ETERNITY</a>

    <a href="https://sites.google.com/view/cookingwitjay-ultra/home" target="_blank">Cookingwitjay ULTRA</a>

    <a href="https://stormy2tuff.github.io/Fruit-ninja/" target="_blank">Fruit-ninja</a>

  </div>

</div>

<script>

/* OPEN HUB */
function openHub(){
  document.getElementById("start").classList.add("hidden");
  document.getElementById("hub").classList.remove("hidden");
}

/* PARTICLES */
for(let i=0;i<80;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  p.style.opacity=Math.random();
  document.body.appendChild(p);
}

</script>

</body>
</html>
